<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re-Memo: Relembre suas tarefas</title>
    <link href="assets/css/style.css" rel="stylesheet">
    <link rel="icon" href="https://www.svgrepo.com/show/311307/task-list.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="https://www.svgrepo.com/show/311307/task-list.svg" alt="Logo" width="40" height="34"
                        class="d-inline-block align-text-middle">
                    Re-Memo: Relembre suas tarefas
                </a>

                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createTask">
                + Criar nova tarefa
                </button>
            </div>
        </nav>

        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Tarefas a fazer</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="finished-tasks.html">Tarefas concluídas</a>
            </li>
        </ul>



        <div>
            <div class="modal fade" id="createTask" tabindex="-1" aria-labelledby="createTaskLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="createTaskLabel">Nova tarefa</h1>
                            <button type="button" id="close-modal-button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form>
                                <div class="mb-3">
                                    <label for="task-title" class="col-form-label">Título</label>
                                    <input type="text" class="form-control" id="task-title">
                                </div>
                                <div class="mb-3">
                                    <label for="task-description" class="col-form-label">Descrição</label>
                                    <textarea class="form-control" id="task-description"></textarea>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" onclick="createTask(false)">Criar outra</button>
                            <button type="button" class="btn btn-primary" onclick="createTask(true)">Criar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="todo d-flex flex-wrap justify-content-center" id="todo-tasks"></div>
    
    


    <script src="assets/js/todo-tasks.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
